name: release

# Cuts cross-platform binaries for all three orlop programs on tag push.
#
#   git tag v0.2.1 && git push origin v0.2.1
#
# Each runner builds the two Go binaries (orlop-control, orlop-server) and the
# Rust client (orlop) for its own OS/arch, tars them up, and a final job
# publishes them to the GitHub Release for the tag. `workflow_dispatch` runs the
# same build for a smoke test but uploads only to the Actions artifacts, never
# to a release.
#
# Why no macFUSE on the macOS jobs: `fuser` is gated to Linux in Cargo.toml, so
# the darwin build uses the in-process NFSv3 path and compiles without it. Only
# the Linux jobs need libfuse3-dev. The Go binaries are pure Go (modernc SQLite +
# pgx, no cgo), so CGO_ENABLED=0 builds them on every target without a C toolchain.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04,     os: linux,  arch: amd64, rust_target: x86_64-unknown-linux-gnu }
          - { runner: ubuntu-24.04-arm, os: linux,  arch: arm64, rust_target: aarch64-unknown-linux-gnu }
          # Both darwin targets build on the Apple-Silicon runner: x86_64 is
          # cross-compiled there (Go via GOARCH; Rust via the x86_64-apple-darwin
          # target). GitHub's Intel macos-13 runners are scarce and can sit
          # unassigned for hours, which would block the whole release.
          - { runner: macos-14,         os: darwin, arch: amd64, rust_target: x86_64-apple-darwin }
          - { runner: macos-14,         os: darwin, arch: arm64, rust_target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@v4

      - name: Install fuse3 dev headers (Linux only)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build Go binaries
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_REF_NAME" = "$version" ]; then
            version="$(git rev-parse --short HEAD)"   # workflow_dispatch: no tag
          fi
          mkdir -p dist
          ldflags="-s -w -X github.com/liu1700/orlop/internal/buildinfo.version=${version}"
          go build -trimpath -ldflags "$ldflags" -o dist/orlop-control ./cmd/orlop-control
          go build -trimpath -ldflags "$ldflags" -o dist/orlop-server  ./cmd/orlop-server

      - name: Build Rust binary
        run: |
          cargo build --release --locked --bin orlop --target "${{ matrix.rust_target }}"
          cp "target/${{ matrix.rust_target }}/release/orlop" dist/orlop

      - name: Package tarball + checksum
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_REF_NAME" = "$version" ]; then
            version="$(git rev-parse --short HEAD)"   # workflow_dispatch: no tag
          fi
          name="orlop_${version}_${{ matrix.os }}_${{ matrix.arch }}"
          tar -C dist -czf "${name}.tar.gz" orlop orlop-control orlop-server
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "tarball=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.tarball }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.tarball }}.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Publish multi-arch (amd64 + arm64) container images to GHCR, reusing the
  # binaries the build job already compiled natively per-arch (no in-Docker
  # rebuild, no QEMU compile). Sibling of `release`, so an image-publish failure
  # never blocks the binary release. Tag-only; see docs/container-images.md.
  images:
    name: publish orlop-${{ matrix.image }} image
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [control, server, mount]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Stage per-arch binaries
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p docker/bin/amd64 docker/bin/arm64
          tar -C docker/bin/amd64 -xzf "artifacts/orlop_${version}_linux_amd64.tar.gz"
          tar -C docker/bin/arm64 -xzf "artifacts/orlop_${version}_linux_arm64.tar.gz"

      # QEMU only emulates the mount image's apt step on the non-native arch; the
      # control/server images are RUN-less (COPY pre-built binary), so they need
      # no emulation.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/orlop-${{ matrix.image }}
          # The release tag (vX.Y.Z) plus a moving latest. Consumers can also pin
          # by immutable digest (ghcr.io/.../orlop-<img>@sha256:…), printed below.
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/${{ matrix.image }}.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print immutable digest
        run: |
          echo "orlop-${{ matrix.image }} digest: ${{ steps.build.outputs.digest }}"
          echo "pin with: ghcr.io/${{ github.repository_owner }}/orlop-${{ matrix.image }}@${{ steps.build.outputs.digest }}"
