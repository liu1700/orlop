name: orlop-cli

on:
  # Runs on every PR (not path-filtered) so it can be a required status check
  # that always reports — otherwise a PR touching no Rust files would leave the
  # required `build` check stuck "Expected" and unmergeable.
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/orlop-cli.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install fuse3 dev headers
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --locked

      - run: cargo test --locked

# Note: macOS builds live in release.yml (runs on tag push only). They need no
# macFUSE: `fuser` is Linux-gated in Cargo.toml, so the darwin build uses the
# in-process NFSv3 path and compiles without it. A macos job here would still
# burn ~10x billing minutes per push for little PR signal, so PR CI stays
# Linux-only on purpose.
