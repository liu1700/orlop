{{- if not .Values.auth.existingSecret }}
{{- if not .Values.auth.controlPlaneToken }}{{ fail "auth.controlPlaneToken is required (or set auth.existingSecret). Generate one: openssl rand -hex 24" }}{{- end }}
{{- if not .Values.auth.secretsEncKey }}{{ fail "auth.secretsEncKey is required (hex 32-byte AES key for the in-Postgres CA root key; or set auth.existingSecret). Generate one: openssl rand -hex 32" }}{{- end }}
{{- if not .Values.database.url }}{{ fail "database.url is required (the external Postgres connection string; or set auth.existingSecret)" }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "orlop.secretName" . }}
  labels:
    {{- include "orlop.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Shared control<->server token: control reads it as ORLOP_CONTROL_PLANE_TOKEN,
  # the server as ORLOP_DATAGW_SERVICE_TOKEN. One source, so they always match.
  control-plane-token: {{ .Values.auth.controlPlaneToken | quote }}
  # AES-256 key (hex) that encrypts the CA root key at rest in Postgres.
  secrets-enc-key: {{ .Values.auth.secretsEncKey | quote }}
  database-url: {{ .Values.database.url | quote }}
{{- end }}
