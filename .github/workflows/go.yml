name: go

on:
  # Runs on every PR (not path-filtered) so it can be a required status check
  # that always reports — otherwise a PR touching no Go files would leave the
  # required `go` check stuck "Expected" and unmergeable.
  pull_request:
  push:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
